<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Five Nights at Epstein's</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Courier New', monospace; color: #fff; }
    #loading-screen {
      position: fixed; inset: 0; background: #000;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
      z-index: 1000;
    }
    h1 { font-size: 32px; letter-spacing: 4px; color: #ff6e3a; text-shadow: 0 0 20px rgba(255,110,58,0.5); text-align: center; line-height: 1.3; }
    .subtitle { font-size: 12px; color: rgba(200,150,120,0.6); letter-spacing: 3px; }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,110,58,0.2); border-top-color: #ff6e3a; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #status { font-size: 11px; color: rgba(255,110,58,0.6); letter-spacing: 2px; text-align: center; max-width: 360px; }
    #progress-bar { width: 300px; height: 3px; background: rgba(255,110,58,0.15); border-radius: 2px; overflow: hidden; }
    #progress-fill { height: 100%; background: #ff6e3a; width: 0%; transition: width 0.15s ease; border-radius: 2px; }
    #error-screen { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 1000; padding: 24px; text-align: center; }
    #error-msg { color: #ff6e6e; font-size: 13px; max-width: 400px; line-height: 1.7; }
    #game-container { width: 100%; height: 100%; display: none; }
    #game-frame { width: 100%; height: 100%; border: none; display: block; }
  </style>
</head>
<body>

<div id="loading-screen">
  <h1>FIVE NIGHTS<br>AT EPSTEIN'S</h1>
  <div class="subtitle">SURVIVE THE NIGHT</div>
  <div class="spinner"></div>
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <div id="status">CONNECTING TO SERVER...</div>
</div>

<div id="error-screen">
  <h1 style="font-size:22px;color:#ff6e6e;">FAILED TO LOAD</h1>
  <div id="error-msg"></div>
</div>

<div id="game-container">
  <iframe id="game-frame" sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-modals" allow="autoplay *"></iframe>
</div>

<script>
const OWNER = 'beastcooper';
const REPO  = 'Five-Nights-at-Epstein';
const ENTRY = 'index.html';

const statusEl = document.getElementById('status');
const fillEl   = document.getElementById('progress-fill');

function setStatus(msg) { statusEl.textContent = msg; }
function setProgress(p) { fillEl.style.width = Math.min(100, p) + '%'; }

function showError(msg) {
  document.getElementById('loading-screen').style.display = 'none';
  const s = document.getElementById('error-screen');
  s.style.display = 'flex';
  document.getElementById('error-msg').textContent = msg;
}

function getMime(path) {
  const ext = (path.split('?')[0].split('.').pop() || '').toLowerCase();
  return ({
    html:'text/html', htm:'text/html',
    css:'text/css',
    js:'application/javascript', mjs:'application/javascript',
    json:'application/json',
    png:'image/png', jpg:'image/jpeg', jpeg:'image/jpeg',
    gif:'image/gif', svg:'image/svg+xml', webp:'image/webp', ico:'image/x-icon',
    mp3:'audio/mpeg', wav:'audio/wav', ogg:'audio/ogg', m4a:'audio/mp4',
    mp4:'video/mp4', webm:'video/webm',
    woff:'font/woff', woff2:'font/woff2', ttf:'font/ttf', otf:'font/otf',
    wasm:'application/wasm',
  })[ext] || 'application/octet-stream';
}

function isText(path) {
  return /\.(html?|css|js|mjs|json|svg|xml|txt|glsl|vert|frag)$/i.test(path);
}

function resolvePath(ref, baseDir) {
  if (!ref) return null;
  const stripped = ref.split('?')[0].split('#')[0];
  if (!stripped || /^(data:|blob:|https?:|\/\/)/.test(stripped)) return null;
  let resolved = stripped.startsWith('/') ? stripped.slice(1) : baseDir + stripped;
  const parts = resolved.split('/');
  const stack = [];
  for (const p of parts) {
    if (p === '.' || p === '') continue;
    if (p === '..') stack.pop();
    else stack.push(p);
  }
  return stack.join('/');
}

async function detectBranch() {
  for (const b of ['master', 'main']) {
    try {
      const r = await fetch(`https://raw.githubusercontent.com/${OWNER}/${REPO}/${b}/${ENTRY}`);
      if (r.ok) return b;
    } catch(e) {}
  }
  throw new Error('Cannot reach repo. Make sure it is public.');
}

async function getAllFiles(branch) {
  const r = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/git/trees/${branch}?recursive=1`);
  if (!r.ok) throw new Error(`GitHub API returned ${r.status}`);
  const data = await r.json();
  if (!Array.isArray(data.tree)) throw new Error('Unexpected API response');
  return data.tree.filter(f => f.type === 'blob').map(f => f.path);
}

async function fetchAll(files, branch, onProgress) {
  const RAW = `https://raw.githubusercontent.com/${OWNER}/${REPO}/${branch}/`;
  const cache = new Map();
  let done = 0;

  // fetch in batches of 10
  const BATCH = 10;
  for (let i = 0; i < files.length; i += BATCH) {
    const batch = files.slice(i, i + BATCH);
    await Promise.all(batch.map(async path => {
      try {
        const r = await fetch(RAW + path);
        if (!r.ok) { done++; onProgress(done, files.length); return; }
        const buf = await r.arrayBuffer();
        const mime = getMime(path);
        const blobUrl = URL.createObjectURL(new Blob([buf], { type: mime }));
        cache.set(path, { blobUrl, buf, mime, isText: isText(path) });
      } catch(e) {
        console.warn('skip:', path);
      }
      done++;
      onProgress(done, files.length);
    }));
  }
  return cache;
}

function rewriteHtml(html, cache, entryDir) {
  function rw(ref) {
    const resolved = resolvePath(ref, entryDir);
    if (resolved && cache.has(resolved)) return cache.get(resolved).blobUrl;
    return ref;
  }

  // rewrite src= and href=
  html = html.replace(/((?:src|href)\s*=\s*)(["'])([^"'#?]+?)(\2)/gi, (m, attr, q, ref, q2) => {
    const n = rw(ref);
    return n !== ref ? attr + q + n + q2 : m;
  });

  // rewrite url() in inline styles
  html = html.replace(/url\(\s*(["']?)([^)"']+?)\1\s*\)/gi, (m, q, ref) => {
    const n = rw(ref);
    return n !== ref ? `url(${q}${n}${q})` : m;
  });

  return html;
}

async function loadGame() {
  try {
    setStatus('DETECTING BRANCH...');
    setProgress(3);
    const branch = await detectBranch();

    setStatus('FETCHING FILE LIST...');
    setProgress(7);
    const files = await getAllFiles(branch);
    setStatus(`FOUND ${files.length} FILES — DOWNLOADING...`);

    const cache = await fetchAll(files, branch, (done, total) => {
      const pct = 7 + Math.round((done / total) * 83);
      setProgress(pct);
      setStatus(`LOADING ${done} / ${total}`);
    });

    setStatus('BUILDING GAME...');
    setProgress(92);

    // Get index.html text
    const entryInfo = cache.get(ENTRY);
    if (!entryInfo) throw new Error('index.html not found in repo');
    const decoder = new TextDecoder();
    let html = decoder.decode(entryInfo.buf);
    const entryDir = ENTRY.includes('/') ? ENTRY.slice(0, ENTRY.lastIndexOf('/') + 1) : '';

    // Remove any <base> tag so we control all URLs
    html = html.replace(/<base[^>]*>/gi, '');

    // Rewrite all static references
    html = rewriteHtml(html, cache, entryDir);

    // Build JS interceptor so dynamic loads (Image, fetch, XHR) also work
    const mapObj = {};
    cache.forEach((v, k) => { mapObj[k] = v.blobUrl; });

    const interceptor = `<script>
(function(){
  const M = ${JSON.stringify(mapObj)};
  function map(url){
    if(!url||typeof url!=='string') return url;
    if(/^(blob:|data:)/.test(url)) return url;
    // strip query/hash
    const clean = url.split('?')[0].split('#')[0];
    // try direct key
    if(M[clean]) return M[clean];
    // try stripping leading slash
    const noSlash = clean.replace(/^\\//, '');
    if(M[noSlash]) return M[noSlash];
    // try extracting just the path after origin
    try {
      const u = new URL(url, location.href);
      const p = u.pathname.replace(/^\\//, '');
      if(M[p]) return M[p];
    } catch(e){}
    return url;
  }
  // patch fetch
  const oFetch = window.fetch;
  window.fetch = function(input, init){
    if(typeof input==='string') input=map(input);
    else if(input instanceof Request){
      const m=map(input.url);
      if(m!==input.url) input=new Request(m,input);
    }
    return oFetch.call(this,input,init);
  };
  // patch XHR
  const oOpen = XMLHttpRequest.prototype.open;
  XMLHttpRequest.prototype.open = function(method,url,...rest){
    return oOpen.call(this,method,map(String(url)),...rest);
  };
  // patch Image
  const oImg = window.Image;
  window.Image = function(w,h){
    const img = new oImg(w,h);
    const d = Object.getOwnPropertyDescriptor(HTMLImageElement.prototype,'src');
    Object.defineProperty(img,'src',{
      set(v){d.set.call(this,map(v));},
      get(){return d.get.call(this);}
    });
    return img;
  };
  // patch Audio
  const oAudio = window.Audio;
  if(oAudio) window.Audio = function(src){ return new oAudio(src?map(src):src); };
  // patch createElement for dynamic script/link/img tags
  const oCreate = document.createElement.bind(document);
  document.createElement = function(tag,...args){
    const el = oCreate(tag,...args);
    const t = tag.toLowerCase();
    if(t==='img'||t==='script'||t==='audio'||t==='video'||t==='source'){
      const d = Object.getOwnPropertyDescriptor(HTMLElement.prototype,'src') ||
                Object.getOwnPropertyDescriptor(el.__proto__,'src');
      if(d && d.set){
        Object.defineProperty(el,'src',{
          set(v){d.set.call(this,map(v));},
          get(){return d.get.call(this);}
        });
      }
    }
    if(t==='link'){
      const d = Object.getOwnPropertyDescriptor(HTMLLinkElement.prototype,'href');
      if(d && d.set){
        Object.defineProperty(el,'href',{
          set(v){d.set.call(this,map(v));},
          get(){return d.get.call(this);}
        });
      }
    }
    return el;
  };
})();
<\/script>`;

    // Inject interceptor as first thing in <head>
    if (/<head[^>]*>/i.test(html)) {
      html = html.replace(/(<head[^>]*>)/i, '$1' + interceptor);
    } else {
      html = interceptor + html;
    }

    setProgress(98);
    setStatus('STARTING...');

    const blob = new Blob([html], { type: 'text/html' });
    const url  = URL.createObjectURL(blob);
    const frame = document.getElementById('game-frame');
    frame.src = url;

    frame.onload = () => {
      setProgress(100);
      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('game-container').style.display = 'block';
    };

  } catch(err) {
    console.error(err);
    showError(err.message);
  }
}

loadGame();
</script>
</body>
</html>
